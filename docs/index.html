<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>디지털 방콕 인사이트 — 개념 은하</title>
<meta name="description" content="책 '디지털 방콕 인사이트'의 개념들을 은하로 탐험하는 위키.">
<meta property="og:title" content="디지털 방콕 인사이트 — 개념 은하">
<meta property="og:description" content="태국 디지털 경제를 다룬 책 한 권이 별 200여 개의 은하가 됐습니다. 별을 클릭해 개념을 읽어보세요.">
<meta property="og:image" content="__BASE_URL__/assets/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='7' fill='%23E8A33D'/%3E%3Ccircle cx='26' cy='9' r='2.4' fill='%236FC3E8'/%3E%3Ccircle cx='6' cy='23' r='1.8' fill='%23F08BA5'/%3E%3C/svg%3E">
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js",
               "three/addons/": "./vendor/addons/" } }
</script>
</head>
<body>

<canvas id="stage" aria-hidden="true"></canvas>

<header class="topbar">
  <div class="brand">
    <span class="eyebrow">LLM Wiki · 개념 은하</span>
    <h1>디지털 방콕 인사이트</h1>
  </div>
  <nav class="controls" aria-label="탐색 도구">
    <div class="search" role="combobox" aria-expanded="false" aria-haspopup="listbox">
      <input id="search-input" type="search" placeholder="개념 검색 (예: 프롬프트페이)"
             aria-label="개념 검색" autocomplete="off">
      <ul id="search-results" role="listbox" aria-label="검색 결과" hidden></ul>
    </div>
    <button id="btn-tour" class="pill" aria-pressed="false">투어</button>
    <button id="btn-list" class="pill" aria-pressed="false">목록</button>
    <button id="btn-motion" class="pill icon" aria-pressed="true" aria-label="움직임 켜짐, 누르면 정지">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><circle cx="7" cy="7" r="2.2" fill="currentColor"/><path d="M7 1a6 6 0 0 1 6 6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
    </button>
  </nav>
</header>

<div id="legend" role="group" aria-label="은하팔 필터"></div>

<div id="progress" aria-live="off"></div>

<aside id="panel" aria-label="개념 문서" hidden>
  <div class="sheet-grip" id="sheet-grip" aria-hidden="true"><span></span></div>
  <button class="panel-close" id="panel-close" aria-label="패널 닫기 (Esc)">×</button>
  <div class="panel-scroll" id="panel-body" tabindex="-1"></div>
</aside>

<div id="list-view" hidden>
  <div class="list-frame">
    <header class="list-head">
      <h2>모든 별</h2>
      <button class="pill" id="list-close" aria-label="목록 닫기">닫기</button>
    </header>
    <div class="list-body" id="list-body"></div>
  </div>
</div>

<div id="tour-card" hidden>
  <div class="tour-inner">
    <div class="tour-meta">
      <span class="eyebrow" id="tour-part"></span>
      <span id="tour-step"></span>
    </div>
    <p id="tour-intro"></p>
    <div class="tour-controls">
      <button class="pill" id="tour-prev" aria-label="이전 별">이전</button>
      <button class="pill" id="tour-pause" aria-pressed="false" aria-label="자동 진행 일시정지">일시정지</button>
      <button class="pill" id="tour-next" aria-label="다음 별">다음</button>
      <button class="pill quiet" id="tour-exit" aria-label="투어 종료">종료</button>
    </div>
  </div>
</div>

<div id="loading">
  <div class="load-sun" aria-hidden="true"></div>
  <p class="load-title">디지털 방콕 인사이트</p>
  <p class="load-count" id="load-count">은하를 여는 중</p>
  <button class="pill quiet" id="skip-intro" hidden>건너뛰기</button>
</div>

<div id="toast" role="status" aria-live="polite" hidden></div>
<div id="debug" hidden></div>

<noscript><div class="noscript">이 위키는 JavaScript로 그려지는 3D 은하입니다. JavaScript를 켜 주세요.</div></noscript>

<script type="module" src="./js/main.js"></script>
</body>
</html>
